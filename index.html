<!DOCTYPE html>

  <title>Smart Notes AI</title>
  <link rel="stylesheet" href="src/css/styles.css">
</head>

<body>

  <div class="container">
    <div class="title-box">

      <h2 class="section-title">Decisions</h2>
      <ul id="decisionList" class="list">
       
      </ul>

      <h2 class="section-title">Action Items</h2>
      <ul id="actionList" class="list">
        
      </ul>

    </div>

  </div>
 <script src="src/js/main.js"></script>

</html>
