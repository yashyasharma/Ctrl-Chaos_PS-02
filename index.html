<!DOCTYPE html>
<html>

<head>
  <title>Smart Notes AI</title>
  <link rel="stylesheet" href="src/css/styles.css">
</head>

<body>

  <div class="container">

    <h1 class="title">Smart Notes AI</h1>

    <textarea class="input-box" placeholder="Paste your meeting notes here..."></textarea>

    <br><br>

    <button class="btn">Summarize</button>

    <div class="output-box">

      <h2 class="section-title">Summary</h2>
      <p class="P1">This is where your summary will appear...</p>

      <h2 class="section-title">Decisions</h2>
      <ul class="list">
        <li>Decision 1</li>
        <li>Decision 2</li>
      </ul>

      <h2 class="section-title">Action Items</h2>
      <ul class="list">
        <li><input type="checkbox"> Task 1</li>
        <li><input type="checkbox"> Task 2</li>
      </ul>

    </div>

  </div>

</body>

</html>
